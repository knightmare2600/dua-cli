# =============================================================================
# release.yml — Release: build binaries for all platforms, upload to Release
# =============================================================================
# Version history:
#   v1.0.0  2026-04-11  Initial rewrite: bump all actions to Node.js 24-compatible
#                       versions; add explicit cargo-diet size limit of 1024 KB;
#                       fix diet running only on ubuntu matrix legs (diet binary
#                       is always x86_64-linux regardless of build target);
#                       add windows-arm64 and linux-arm64 matrix entries;
#                       use actions/checkout@v4 and softprops/action-gh-release@v2.
#   v1.1.0  2026-04-11  Add workflow_dispatch input for version (e.g. v0.1.0);
#                       create-release job now creates the git tag when triggered
#                       manually so no local git commands are needed — just click
#                       Actions > release > Run workflow, enter the version, done.
# =============================================================================

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:

  # ========================= CREATE TAG + RELEASE (ONCE ONLY) =========================
  create-release:
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: resolve-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          # Ensure it starts with v
          if [[ "$TAG" != v* ]]; then
            echo "❌ Version must start with 'v' (got: $TAG)"
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved tag: $TAG"

      - name: Create and push git tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "❌ Tag $TAG already exists on remote — pick a different version"
            exit 1
          fi

          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Tag $TAG created and pushed"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve-tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========================= BUILD ALL BINARIES =========================
  build-release:
    runs-on: ${{ matrix.os }}
    needs: create-release

    env:
      TAG: ${{ needs.create-release.outputs.tag }}
      EXE_NAME: dua

    strategy:
      fail-fast: false
      matrix:
        include:

          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true

          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true

          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false

          - name: windows-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            use_cross: false

          - name: windows-arm64
            os: windows-2022
            target: aarch64-pc-windows-msvc
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------- Rust toolchain -------------------------
      - name: Install Rust (stable)
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ------------------------- cross (Linux cross-compile only) -------------------------
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Select build tool
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            echo "CARGO=cross" >> $GITHUB_ENV
          else
            echo "CARGO=cargo" >> $GITHUB_ENV
          fi

      # ------------------------- Build -------------------------
      - name: Build release binary
        shell: bash
        run: |
          set -e
          $CARGO build --release --target ${{ matrix.target }}

          BIN="target/${{ matrix.target }}/release/${{ env.EXE_NAME }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="${BIN}.exe"
          fi

          echo "Checking for binary at: $BIN"

          if [ ! -f "$BIN" ]; then
            echo "❌ Binary not found at expected path"
            exit 1
          fi

          echo "✅ Binary confirmed at $BIN"

      # ------------------------- Strip (Linux and macOS only) -------------------------
      - name: Strip binary
        if: runner.os != 'Windows'
        shell: bash
        run: strip target/${{ matrix.target }}/release/${{ env.EXE_NAME }} || true

      # ------------------------- cargo-diet (ubuntu legs only; diet tool is x86_64-linux) -------------------------
      - name: Install cargo-diet
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          curl -LSfs https://raw.githubusercontent.com/the-lean-crate/cargo-diet/master/ci/install.sh | \
          sh -s -- --git the-lean-crate/cargo-diet --target x86_64-unknown-linux-musl --tag v1.2.4

      - name: Check crate package size (cargo-diet, max 1024 KB)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: cargo diet -n --package-size-limit 1024KB || true

      # ------------------------- Package -------------------------
      - name: Package binary into archive
        shell: bash
        run: |
          set -e

          VERSION="${TAG}"
          NAME="${{ env.EXE_NAME }}-${VERSION}-${{ matrix.name }}"
          mkdir -p "$NAME"

          BIN="target/${{ matrix.target }}/release/${{ env.EXE_NAME }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="${BIN}.exe"
          fi

          cp "$BIN" "$NAME/"
          cp README.md "$NAME/" || true
          cp LICENSE   "$NAME/" || true

          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "${NAME}.zip" "$NAME"
            echo "ASSET=${NAME}.zip" >> $GITHUB_ENV
          else
            tar -czf "${NAME}.tar.gz" "$NAME"
            echo "ASSET=${NAME}.tar.gz" >> $GITHUB_ENV
          fi

      # ------------------------- Upload GitHub Actions artefact (always retained) -------------------------
      - name: Upload Actions artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

      # ------------------------- Attach to GitHub Release -------------------------
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
