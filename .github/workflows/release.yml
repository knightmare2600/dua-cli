name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ========================= CREATE RELEASE (ONCE ONLY) =========================
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========================= BUILD ALL BINARIES =========================
  build-release:
    runs-on: ${{ matrix.os }}
    needs: create-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true

          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true

          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false

          - name: windows-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            use_cross: false

          - name: windows-arm64
            os: windows-2022
            target: aarch64-pc-windows-msvc
            use_cross: false

    env:
      EXE_NAME: dua

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------- Rust toolchain -------------------------
      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      # ------------------------- cross (Linux only) -------------------------
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Select build tool
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            echo "CARGO=cross" >> $GITHUB_ENV
          else
            echo "CARGO=cargo" >> $GITHUB_ENV
          fi

      # ------------------------- Build -------------------------
      - name: Build
        shell: bash
        run: |
          set -e
          $CARGO build --release --target ${{ matrix.target }}

          BIN="target/${{ matrix.target }}/release/${{ env.EXE_NAME }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="$BIN.exe"
          fi

          echo "Checking for binary at: $BIN"

          if [ ! -f "$BIN" ]; then
            echo "❌ Binary missing"
            exit 1
          fi

          echo "✅ Binary exists"

      # ------------------------- Strip (non-Windows) -------------------------
      - name: Strip binary
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/${{ env.EXE_NAME }} || true

      # ------------------------- cargo-diet (Linux only, non-fatal) -------------------------
      - name: Install cargo-diet
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          curl -LSfs https://raw.githubusercontent.com/the-lean-crate/cargo-diet/master/ci/install.sh | \
          sh -s -- --git the-lean-crate/cargo-diet --target x86_64-unknown-linux-musl --tag v1.2.4

      - name: Check crate size
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cargo diet -n || true

      # ------------------------- Package -------------------------
      - name: Package
        shell: bash
        run: |
          set -e

          VERSION="${GITHUB_REF_NAME}"
          NAME="${{ env.EXE_NAME }}-${VERSION}-${{ matrix.name }}"
          mkdir -p "$NAME"

          BIN="target/${{ matrix.target }}/release/${{ env.EXE_NAME }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="$BIN.exe"
          fi

          cp "$BIN" "$NAME/"
          cp README.md "$NAME/" || true
          cp LICENSE "$NAME/" || true

          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$NAME.zip" "$NAME"
            echo "ASSET=$NAME.zip" >> $GITHUB_ENV
          else
            tar -czf "$NAME.tar.gz" "$NAME"
            echo "ASSET=$NAME.tar.gz" >> $GITHUB_ENV
          fi

      # ------------------------- Upload artifact (always) -------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

      # ------------------------- Upload to GitHub Release -------------------------
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
