# The way this works is a little weird. But basically, the create-release job runs purely to initialize the GitHub release itself. Once done, the upload
# URL of the release is saved as an artifact.
#
# The build-release job runs only once create-release is finished. It gets the release upload URL by downloading the corresponding artifact (which was
# uploaded by create-release). It then builds the release executables for each supported platform and attaches them as release assets to the previously
# created release.
#
# The key here is that we create the release only once.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: build-release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true

          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true

          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false

          - name: windows-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            use_cross: false

          - name: windows-arm64
            os: windows-2022
            target: aarch64-pc-windows-msvc
            use_cross: false

    env:
      EXE_NAME: dua

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Install Rust toolchain
      # -------------------------
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ startsWith(matrix.target, 'x86_64-pc-windows') || startsWith(matrix.target, 'aarch64-pc-windows') && 'nightly' || 'stable' }}
          profile: minimal
          override: true
          target: ${{ matrix.target }}

      # -------------------------
      # Install cross (only when needed)
      # -------------------------
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      # -------------------------
      # Set cargo command
      # -------------------------
      - name: Configure build command
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            echo "CARGO=cross" >> $GITHUB_ENV
          else
            echo "CARGO=cargo" >> $GITHUB_ENV
          fi

      # -------------------------
      # Build binary
      # -------------------------
      - name: Build release binary
        shell: bash
        run: |
          $CARGO build --release --target ${{ matrix.target }}

      # -------------------------
      # Strip binaries (optional)
      # -------------------------
      - name: Strip binary (unix)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/${{ env.EXE_NAME }} || true

      # -------------------------
      # Prepare archive
      # -------------------------
      - name: Package release
        shell: bash
        run: |
          set -e

          VERSION="${GITHUB_REF_NAME}"
          STAGING="${{ env.EXE_NAME }}-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGING"

          cp README.md "$STAGING/" || true
          cp LICENSE "$STAGING/" || true

          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/${{ env.EXE_NAME }}.exe "$STAGING/"
            7z a "$STAGING.zip" "$STAGING"
            echo "ASSET=$STAGING.zip" >> $GITHUB_ENV
          else
            cp target/${{ matrix.target }}/release/${{ env.EXE_NAME }} "$STAGING/"
            tar -czf "$STAGING.tar.gz" "$STAGING"
            echo "ASSET=$STAGING.tar.gz" >> $GITHUB_ENV
          fi

      # -------------------------
      # Upload to GitHub Release
      # -------------------------
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
