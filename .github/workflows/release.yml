name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # =========================
  # CREATE RELEASE (ONCE ONLY)
  # =========================
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # =========================
  # BUILD ALL BINARIES
  # =========================
  build-release:
    name: build-release
    runs-on: ${{ matrix.os }}
    needs: create-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
            toolchain: stable

          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
            toolchain: stable

          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
            toolchain: stable

          - name: windows-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            use_cross: false
            toolchain: nightly

          - name: windows-arm64
            os: windows-2022
            target: aarch64-pc-windows-msvc
            use_cross: false
            toolchain: nightly

    env:
      EXE_NAME: dua

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Rust toolchain
      # -------------------------
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install ${{ matrix.toolchain }} --profile minimal
          rustup default ${{ matrix.toolchain }}
          rustup target add ${{ matrix.target }}

      # -------------------------
      # cross (only when needed)
      # -------------------------
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Configure build command
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            echo "CARGO=cross" >> $GITHUB_ENV
          else
            echo "CARGO=cargo" >> $GITHUB_ENV
          fi

      # -------------------------
      # Build
      # -------------------------
      - name: Build release binary
        shell: bash
        run: |
          $CARGO build --release --target ${{ matrix.target }}

      # -------------------------
      # Strip (unix only)
      # -------------------------
      - name: Strip binary
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/${{ env.EXE_NAME }} || true

      # -------------------------
      # Package
      # -------------------------
      - name: Package release
        shell: bash
        run: |
          set -e

          VERSION="${GITHUB_REF_NAME}"
          STAGING="${{ env.EXE_NAME }}-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGING"

          cp README.md "$STAGING/" || true
          cp LICENSE "$STAGING/" || true

          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/${{ env.EXE_NAME }}.exe "$STAGING/"
            7z a "$STAGING.zip" "$STAGING"
            echo "ASSET=$STAGING.zip" >> $GITHUB_ENV
          else
            cp target/${{ matrix.target }}/release/${{ env.EXE_NAME }} "$STAGING/"
            tar -czf "$STAGING.tar.gz" "$STAGING"
            echo "ASSET=$STAGING.tar.gz" >> $GITHUB_ENV
          fi

      # -------------------------
      # Upload to release
      # -------------------------
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
